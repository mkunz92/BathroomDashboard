<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Bad Dashboard</title>
    <link rel="preconnect" href="https://api.openweathermap.org" />
    <link rel="preconnect" href="https://openweathermap.org" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <section class="clock-panel">
        <div class="location-label">Arnstadt · Plauesche Straße</div>
        <div class="greeting-block">
          <p class="greeting" id="greeting">Guten Tag</p>
          <p class="date-line" id="dateLine">--</p>
        </div>

        <div class="analog-clock" aria-label="Analoguhr">
          <div class="clock-face">
            <div class="tick tick-12"></div>
            <div class="tick tick-1"></div>
            <div class="tick tick-2"></div>
            <div class="tick tick-3"></div>
            <div class="tick tick-4"></div>
            <div class="tick tick-5"></div>
            <div class="tick tick-6"></div>
            <div class="tick tick-7"></div>
            <div class="tick tick-8"></div>
            <div class="tick tick-9"></div>
            <div class="tick tick-10"></div>
            <div class="tick tick-11"></div>
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="hand second-hand" id="secondHand"></div>
            <div class="clock-center"></div>
          </div>
        </div>

        <div class="digital-time" id="digitalTime">00:00:00</div>
        <div class="status-line" id="statusLine">Lade Wetterdaten …</div>
      </section>

      <section class="weather-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">5-Tage-Vorschau</p>
            <h1>Wetter</h1>
          </div>
          <div class="refresh-pill">Update alle 30 Minuten</div>
        </div>

        <div class="weather-grid" id="weatherGrid" aria-live="polite"></div>
      </section>
    </main>

    <template id="weatherCardTemplate">
      <article class="weather-card">
        <div class="weather-card-top">
          <div>
            <p class="weekday"></p>
            <p class="date"></p>
          </div>
          <img class="weather-icon" alt="" />
        </div>
        <p class="weather-desc"></p>
        <div class="temps">
          <span class="temp-max"></span>
          <span class="temp-min"></span>
        </div>
        <div class="weather-meta">
          <span class="precip"></span>
          <span class="wind"></span>
        </div>
      </article>
    </template>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
