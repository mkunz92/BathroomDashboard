<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnstadt Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body class="day-mode">
  <video id="bgVideo" class="bg-video" autoplay muted loop playsinline>
    <source src="assets/24216-340670744_medium.mp4" type="video/mp4">
  </video>
  
  <div id="bgImage" class="bg-image"></div>
  <div class="bg-overlay"></div>

  <main class="layout">
    <section class="left-panel">
      <div class="clock-block">
        <div id="greeting" class="greeting">Guten Abend</div>
        <div id="clock" class="clock">18:55</div>
        <div id="date" class="date">Mittwoch, 18.03.2026</div>
        <div class="location">Arnstadt · Plauesche Straße</div>
      </div>
    </section>

    <section class="right-panel">
      <div class="weather-header">
        <div class="weather-kicker">5-Tage-Vorschau</div>
        <h1>Wetter</h1>
      </div>

      <div id="weather" class="weather-grid" aria-live="polite"></div>
    </section>
  </main>

<script src="config.js?v=7"></script>
<script src="app.js?v=7"></script>
</body>
</html>
